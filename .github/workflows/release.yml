name: Release

on:
  push:
    tags:
      - "*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate embedded sound
        run: go run scripts/gen_sound.go

      - name: Build binaries
        run: |
          make linux
          make darwin-arm
          make darwin-amd

      - name: Generate checksums
        run: cd bin && sha256sum pomodoro-* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bin/pomodoro-linux-amd64
            bin/pomodoro-darwin-arm64
            bin/pomodoro-darwin-amd64
            bin/checksums.txt
