name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate embedded sound
        run: go run scripts/gen_sound.go

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...
